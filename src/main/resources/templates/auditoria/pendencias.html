<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pendências de Lançamentos</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="max-w-4xl mx-auto px-4 md:px-8 py-8">
    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1 flex-wrap">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a th:href="@{/empresastf/todas}" class="hover:underline">Empresas</a>
                    <span>/</span>
                    <span th:text="${empresaId}">Empresa</span>
                    <span>/</span>
                    <span th:text="${competencia}">Competência</span>
                    <span>/</span>
                    <span>Auditoria</span>
                </div>
                <!-- Título -->
                <h1 class="text-2xl md:text-3xl font-bold text-emerald-800 flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-6 h-6 text-emerald-600"></i>
                    Pendências de Lançamentos
                </h1>
            </div>
            <div class="flex gap-2">
                <a th:href="@{/dashboard/fechamento(empresaId=${empresaId})}"
                   class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-600 text-white hover:bg-emerald-700 transition text-sm">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                    Dashboard
                </a>
            </div>
        </div>
    </div>

    <!-- Container principal -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 space-y-6">
        <!-- Informações da empresa e competência -->
        <div class="bg-emerald-100 text-emerald-900 p-4 rounded-xl space-y-1">
            <p><strong>Empresa ID:</strong> <span th:text="${empresaId}">Empresa</span></p>
            <p><strong>Competência:</strong> <span th:text="${competencia}">Competência</span></p>
        </div>

    <!-- Mensagem quando não há pendências -->
    <div th:if="${#lists.isEmpty(pendencias)}"
         class="flex items-center gap-3 bg-emerald-100 border border-emerald-400 text-emerald-800 px-4 py-3 rounded-xl shadow-sm">
        <i data-lucide="check-circle" class="w-5 h-5 text-emerald-600"></i>
        <span>Nenhuma pendência encontrada para esta competência. Tudo certo!</span>
    </div>

    <!-- Tabela de pendências -->
    <div th:if="${!#lists.isEmpty(pendencias)}">
        <table class="min-w-full table-auto border border-emerald-200 mt-2 rounded-xl overflow-hidden text-emerald-900">
            <thead class="bg-emerald-100 text-emerald-800">
            <tr>
                <th class="text-left px-4 py-2 font-semibold">Descrição</th>
                <th class="text-left px-4 py-2 font-semibold">Tipo</th>
                <th class="text-left px-4 py-2 font-semibold">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${pendencias}" class="hover:bg-emerald-50 border-t">
                <td class="px-4 py-2" th:text="${p.descricaoNome}">Descrição</td>
                <td class="px-4 py-2" th:text="${p.tipo}">Tipo</td>
                <td class="px-4 py-2">
                    <div class="flex gap-2">
                        <form th:action="@{/auditoriatf/empresa/{empresaId}/{competencia}/dispensar(empresaId=${empresaId},competencia=${competencia})}"
                              method="post">
                            <input type="hidden" name="descricaoId" th:value="${p.descricaoId}"/>
                            <input type="hidden" name="acao" value="DISPENSADA"/>
                            <button type="submit"
                                    class="px-3 py-1 rounded-lg bg-amber-500 text-white text-xs hover:bg-amber-600">
                                Dispensar
                            </button>
                        </form>

                        <form th:action="@{/auditoriatf/empresa/{empresaId}/{competencia}/dispensar(empresaId=${empresaId},competencia=${competencia})}"
                              method="post">
                            <input type="hidden" name="descricaoId" th:value="${p.descricaoId}"/>
                            <input type="hidden" name="acao" value="IGNORADA"/>
                            <button type="submit"
                                    class="px-3 py-1 rounded-lg bg-slate-600 text-white text-xs hover:bg-slate-700">
                                Ignorar
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Botões de navegação -->
    <div class="pt-4 flex justify-between items-center">
        <a th:href="@{/empresastf/{id}(id=${empresaId})}"
           class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            Voltar para a Empresa
        </a>
        <a th:href="@{/}"
           class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
            <i data-lucide="home" class="w-5 h-5"></i>
            Início
        </a>
    </div>

    </div>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
