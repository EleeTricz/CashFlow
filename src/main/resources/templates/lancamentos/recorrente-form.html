<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lançamentos Recorrentes</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">

    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a href="/empresastf/todas" class="hover:underline">Empresas</a>
                    <span>/</span>
                    <span>Lançamentos Recorrentes</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Lançamentos Recorrentes
                </h1>
            </div>
            <a th:href="@{/empresastf/{empresaId}(empresaId=${empresaId})}"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>
        </div>
    </div>

<div class="bg-white shadow-lg rounded-2xl p-8 border border-emerald-100 max-w-2xl mx-auto">

    <form th:action="@{/lancamentostf/recorrentes}" th:object="${dto}" method="post" class="space-y-6">


        <!-- Campo oculto para Empresa -->
        <input type="hidden" th:field="*{empresaId}" />


        <!-- Usuário -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Usuário</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="user" class="w-5 h-5 text-emerald-500"></i>
                <select th:field="*{usuarioId}" class="w-full bg-transparent outline-none text-emerald-800" required>
                    <option value="" disabled selected>Selecione um usuário</option>
                    <option th:each="usuario : ${usuarios}" th:value="${usuario.id}" th:text="${usuario.nome}"></option>
                </select>
            </div>
        </div>

        <!-- Descrição -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Descrição</label>
            <div class="flex gap-2">
                <select th:field="*{descricaoId}" class="flex-1 p-3 border border-emerald-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition bg-emerald-50" required>
                    <option value="" disabled selected>Selecione uma descrição</option>
                    <option th:each="desc : ${descricoes}" th:value="${desc.id}" th:text="${desc.nome}"></option>
                </select>
                <a th:href="@{/descricoestf/novo(empresaId=${empresaId})}"
                   class="inline-flex items-center gap-1 bg-emerald-600 text-white px-4 py-2 rounded-xl hover:bg-emerald-700 transition text-sm font-medium">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    Nova
                </a>
            </div>
        </div>

        <!-- Valor -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Valor</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="dollar-sign" class="w-5 h-5 text-emerald-500"></i>
                <input type="number" step="0.01" th:field="*{valor}" class="w-full bg-transparent outline-none text-emerald-800" required />
            </div>
        </div>

        <!-- Tipo -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Tipo</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="arrow-left-right" class="w-5 h-5 text-emerald-500"></i>
                <select th:field="*{tipo}" class="w-full bg-transparent outline-none text-emerald-800" required>
                    <option value="ENTRADA">Entrada</option>
                    <option value="SAIDA">Saída</option>
                </select>
            </div>
        </div>

        <!-- Competência Início -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Competência Início (AAAA-MM)</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="calendar" class="w-5 h-5 text-emerald-500"></i>
                <input type="text" th:field="*{competenciaInicio}" placeholder="2025-01" class="w-full bg-transparent outline-none text-emerald-800" required />
            </div>
        </div>

        <!-- Competência Fim -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Competência Fim (AAAA-MM)</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="calendar-days" class="w-5 h-5 text-emerald-500"></i>
                <input type="text" th:field="*{competenciaFim}" placeholder="2025-12" class="w-full bg-transparent outline-none text-emerald-800" required />
            </div>
        </div>

        <!-- Botões -->
        <div class="flex justify-between items-center pt-6">
            <a th:href="@{/empresastf/{empresaId}(empresaId=${empresaId})}"
               class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-6 py-3 rounded-xl hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Cancelar
            </a>
            <button type="submit" class="inline-flex items-center gap-2 bg-emerald-600 text-white px-8 py-3 rounded-xl hover:bg-emerald-700 transition shadow-sm">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
                Gerar Lançamentos
            </button>
        </div>
    </form>

    <!-- Mensagem de sucesso -->
    <div th:if="${mensagem}" class="mt-6 p-4 bg-emerald-100 border border-emerald-200 rounded-xl text-emerald-800 text-center">
        <div class="flex items-center justify-center gap-2">
            <i data-lucide="check-circle" class="w-5 h-5"></i>
            <p th:text="${mensagem}"></p>
        </div>
    </div>
</div>

</div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
