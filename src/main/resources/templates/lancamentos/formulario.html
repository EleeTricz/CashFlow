<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Novo Lançamento</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">

    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a href="/empresastf/todas" class="hover:underline">Empresas</a>
                    <span>/</span>
                    <a th:href="@{/empresastf/{id}(id=${empresa.id})}" th:text="${empresa.nome}" class="hover:underline">Empresa</a>
                    <span>/</span>
                    <a th:href="@{/lancamentostf/competencia/{id}/{competenciaId}(id=${empresa.id}, competenciaId=${competencia.id})}" class="hover:underline">Lançamentos</a>
                    <span>/</span>
                    <span>Novo</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Novo Lançamento
                </h1>
            </div>
            <div class="flex gap-2">
                <a th:href="@{/lancamentostf/recorrentes(empresaId=${empresa.id})}"
                   class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-amber-100 text-amber-700 hover:bg-amber-200 transition">
                    <i data-lucide="repeat" class="w-5 h-5"></i>
                    Recorrente
                </a>
                <a th:href="@{/lancamentostf/competencia/{id}/{competenciaId}(id=${empresa.id}, competenciaId=${competencia.id})}"
                   class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    Voltar
                </a>
            </div>
        </div>
    </div>

<div class="bg-white shadow-lg rounded-2xl p-8 border border-emerald-100 max-w-3xl mx-auto">

    <form th:action="@{/lancamentostf/salvar}"
          method="post"
          th:object="${lancamento}"
          class="space-y-6">

        <!-- Campo oculto para Empresa -->
        <input type="hidden" th:field="*{empresa.id}" />

        <!-- Campo oculto para Competência -->
        <input type="hidden" th:field="*{competencia.id}" />

        <!-- Descrição e Usuário -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="descricao" class="block text-sm font-medium text-emerald-800 mb-1">Descrição</label>
                <div class="flex items-center gap-2">
                    <select id="descricao"
                            th:field="*{descricao}"
                            class="flex-1 min-w-0 p-3 border border-emerald-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition bg-emerald-50">
                        <option value="" disabled selected>Selecione uma descrição</option>
                        <option th:each="descricao : ${descricoes}"
                                th:value="${descricao.id}"
                                th:data-tipo="${descricao.tipo}"
                                th:text="${descricao.nome}">
                            Descrição
                        </option>
                    </select>

                    <a th:href="@{/descricoestf/novo(empresaId=${empresa.id}, competenciaId=${competencia.id})}"
                       class="shrink-0 inline-flex items-center gap-1 bg-emerald-600 text-white px-4 py-3 rounded-xl hover:bg-emerald-700 transition text-sm font-medium whitespace-nowrap">
                        <i data-lucide="circle-plus" class="w-4 h-4"></i>
                        Nova
                    </a>
                </div>
            </div>

            <!-- Usuário -->
            <div>
                <label for="usuario" class="block text-sm font-medium text-emerald-800 mb-1">Usuário</label>
                <select id="usuario" th:field="*{usuario}" class="w-full p-3 border border-emerald-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition bg-emerald-50">
                    <option value="" disabled selected>Selecione um usuário</option>
                    <option th:each="usuario : ${usuarios}"
                            th:value="${usuario.id}"
                            th:text="${usuario.nome}">Usuário</option>
                </select>
            </div>
        </div>

        <!-- Valor -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Valor</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="dollar-sign" class="w-5 h-5 text-emerald-500"></i>
                <input type="number" step="0.01" th:field="*{valor}" class="w-full bg-transparent outline-none text-emerald-800" required />
            </div>
        </div>

        <!-- Tipo -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Tipo</label>
            <select id="tipo" th:field="*{tipo}" disabled
                    class="w-full p-3 border border-emerald-300 rounded-xl bg-emerald-100/50 cursor-not-allowed text-emerald-800">
                <option value="ENTRADA">Entrada</option>
                <option value="SAIDA">Saída</option>
            </select>
            <!-- Campo oculto real que envia o valor -->
            <input type="hidden" th:field="*{tipo}" id="tipoHidden" />
        </div>

        <!-- Data Ocorrência -->
        <div>
            <label for="data_ocorrencia" class="block text-sm font-medium text-emerald-800 mb-1">Data Ocorrência</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="calendar" class="w-5 h-5 text-emerald-500"></i>
                <input type="date" id="data_ocorrencia" th:field="*{dataOcorrencia}" class="w-full bg-transparent outline-none text-emerald-800" />
            </div>
        </div>

        <!-- Competência Referida -->
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-emerald-800 mb-1">Competência Referida</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="clock" class="w-5 h-5 text-emerald-500"></i>
                <select th:field="*{competenciaReferida.id}" class="w-full bg-transparent outline-none text-emerald-800">
                    <option th:each="c : ${competencias}"
                            th:value="${c.id}"
                            th:text="${c.mes} + '/' + ${c.ano}">
                    </option>
                </select>
            </div>
        </div>

        <!-- Botões -->
        <div class="flex justify-between items-center pt-6">
            <a th:href="@{/lancamentostf/competencia/{id}/{competenciaId}(id=${empresa.id}, competenciaId=${competencia.id})}"
               class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-6 py-3 rounded-xl hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Cancelar
            </a>
            <button type="submit" class="inline-flex items-center gap-2 bg-emerald-600 text-white px-8 py-3 rounded-xl hover:bg-emerald-700 transition shadow-sm">
                <i data-lucide="save" class="w-5 h-5"></i>
                Salvar
            </button>
        </div>
    </form>
</div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        lucide.createIcons();

        const descricaoSelect = document.getElementById("descricao");
        const tipoSelect = document.getElementById("tipo");
        const tipoHidden = document.getElementById("tipoHidden");
        const dataOcorrenciaInput = document.getElementById("data_ocorrencia");
        const competenciaInput = document.querySelector('input[name="competencia.id"]');
        const competenciaReferidaSelect = document.querySelector('select[name="competenciaReferida.id"]');

        function getLastDayOfMonth(year, month) {
            return new Date(year, month, 0).toISOString().split('T')[0];
        }

        descricaoSelect.addEventListener("change", function () {
            const selectedOption = descricaoSelect.options[descricaoSelect.selectedIndex];
            const tipo = selectedOption.getAttribute("data-tipo");
            const descricaoNome = selectedOption.textContent.trim();

            // Define tipo (ENTRADA ou SAIDA)
            if (tipo) {
                tipoSelect.value = tipo;
                tipoHidden.value = tipo;
            }

            // Verifica nomes exatos conforme seu banco
            if (descricaoNome === "RECEITAS DE VENDAS"
            || descricaoNome === "COMPRAS A VISTA"
            || descricaoNome === "PROLABORE"
            || descricaoNome === "ORDENADOS SALARIOS"
            || descricaoNome === "ADIANTAMENTO 13º"
            || descricaoNome === "SALARIO INTEGRAL 13º"
            ) {
                const competenciaId = competenciaInput.value;
                competenciaReferidaSelect.value = competenciaId;

                const option = [...competenciaReferidaSelect.options].find(opt => opt.value === competenciaId);
                if (option) {
                    const [mesRaw, anoRaw] = option.textContent.split('/');
                    const mes = parseInt(mesRaw.trim());
                    const ano = parseInt(anoRaw.trim());
                    const dataFinal = getLastDayOfMonth(ano, mes);
                    dataOcorrenciaInput.value = dataFinal;
                }
            }
        });
    });
</script>

</body>
</html>
