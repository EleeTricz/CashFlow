<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Importar DAE</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-green-50 to-emerald-100 px-4 py-10">

<div class="max-w-2xl mx-auto bg-white/95 border border-green-200 p-8 md:p-10 rounded-3xl shadow-xl">

    <div class="mb-8 text-center">
        <p class="text-sm font-medium text-green-600 uppercase tracking-wide">Importacao</p>
        <h1 class="text-3xl font-bold text-green-800 mt-1">Importar Planilha DAE</h1>
        <p class="text-green-700 mt-2">Selecione a empresa de destino e envie o arquivo para pre-visualizar os lancamentos.</p>
    </div>

    <div th:if="${mensagem}"
         class="mb-6 bg-emerald-100 border border-emerald-300 text-emerald-800 px-4 py-3 rounded-xl">
        <span th:text="${mensagem}"></span>
    </div>

    <form method="post"
          enctype="multipart/form-data"
          th:action="@{/importacao-dae/preview}"
          class="space-y-5">

        <div>
            <label class="block mb-2 text-sm font-semibold text-green-800">Empresa</label>
            <select name="empresaId"
                    required
                    class="w-full border border-green-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500 bg-white">
            <option value="">Selecione</option>
            <option th:each="empresa : ${empresas}"
                    th:value="${empresa.id}"
                    th:text="${empresa.nome}"></option>
            </select>
        </div>

        <div>
            <label class="block mb-2 text-sm font-semibold text-green-800">Arquivo DAE (.xlsx ou .xls)</label>
            <input type="file"
                   name="arquivo"
                   accept=".xlsx,.xls"
                   required
                   class="w-full border border-dashed border-green-300 rounded-xl px-4 py-3 bg-green-50">
        </div>

        <div class="flex flex-col sm:flex-row gap-3 pt-2">
            <button type="submit"
                    class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-xl transition">
                Pre-visualizar
            </button>
            <a href="/importartf/todas"
               class="bg-white hover:bg-green-50 text-green-700 border border-green-300 font-semibold px-6 py-3 rounded-xl transition text-center">
                Voltar
            </a>
        </div>
    </form>
</div>

</body>
</html>
