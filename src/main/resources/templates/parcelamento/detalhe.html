<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Parcelamento</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 text-gray-900 font-sans min-h-screen">

<div class="container mx-auto px-4 md:px-8 py-8">

    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a href="/parcelamentostf/todos" class="hover:underline">Parcelamentos</a>
                    <span>/</span>
                    <span>Detalhes</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Detalhes do Parcelamento
                </h1>
            </div>
            <a href="/parcelamentostf/todos"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>
        </div>
    </div>

    <!-- Detalhes do Parcelamento -->
    <div class="bg-white shadow-lg rounded-2xl p-8 mb-8 border border-emerald-100">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-4 bg-emerald-50 rounded-xl">
                <p class="text-sm text-emerald-600 font-medium mb-1">Empresa</p>
                <p class="text-lg font-semibold text-emerald-900" th:text="${parcelamento.empresa.nome}"></p>
            </div>
            <div class="p-4 bg-emerald-50 rounded-xl">
                <p class="text-sm text-emerald-600 font-medium mb-1">Descrição</p>
                <p class="text-lg font-semibold text-emerald-900" th:text="${parcelamento.descricaoBase.nome}"></p>
            </div>
            <div class="p-4 bg-emerald-50 rounded-xl">
                <p class="text-sm text-emerald-600 font-medium mb-1">Total</p>
                <p class="text-lg font-semibold text-emerald-900" th:text="'R$ ' + ${#numbers.formatDecimal(parcelamento.valorTotal, 1, 'COMMA', 2, 'POINT')}"></p>
            </div>
            <div class="p-4 bg-emerald-50 rounded-xl">
                <p class="text-sm text-emerald-600 font-medium mb-1">Total Pago</p>
                <p class="text-lg font-semibold text-emerald-900" th:text="'R$ ' + ${#numbers.formatDecimal(parcelamento.valorTotalPago, 1, 'COMMA', 2, 'POINT')}"></p>
            </div>
        </div>
        <div class="mt-4 flex items-center gap-2">
            <span class="text-sm text-gray-600">Status:</span>
            <span th:if="${parcelamento.quitado}" class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 text-sm font-medium">
                <i data-lucide="check-circle" class="w-4 h-4"></i> Quitado
            </span>
            <span th:unless="${parcelamento.quitado}" class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-amber-100 text-amber-700 text-sm font-medium">
                <i data-lucide="clock" class="w-4 h-4"></i> Em Andamento
            </span>
        </div>
    </div>

    <!-- Lista de Parcelas -->
    <div class="bg-white shadow-lg rounded-2xl p-6 border border-emerald-100">
        <h2 class="text-2xl font-semibold text-emerald-800 mb-5 flex items-center gap-2">
            <i data-lucide="layers" class="w-6 h-6"></i> Parcelas
        </h2>

        <div th:each="parcela : ${parcelamento.parcelas}" class="mb-4 p-5 border border-emerald-100 rounded-xl bg-emerald-50/50 shadow-sm hover:shadow-md transition">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-lg font-semibold text-gray-800 flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4 text-emerald-600"></i>
                        Parcela <span th:text="${parcela.numeroParcela}"></span>
                    </p>
                    <p th:if="${parcela.paga}" class="text-sm font-medium mt-1 inline-flex items-center gap-1 text-emerald-600">
                        <i data-lucide="check-circle" class="w-4 h-4"></i> Paga
                    </p>
                    <p th:unless="${parcela.paga}" class="text-sm font-medium mt-1 inline-flex items-center gap-1 text-amber-600">
                        <i data-lucide="clock" class="w-4 h-4"></i> Pendente
                    </p>
                </div>
                <div>
                    <a th:if="${!parcela.paga}" th:href="@{'/parcelamentostf/pagar/' + ${parcela.id}}"
                       class="inline-flex items-center gap-1 bg-emerald-600 text-white px-4 py-2 rounded-xl hover:bg-emerald-700 text-sm transition shadow">
                        <i data-lucide="credit-card" class="w-4 h-4"></i> Pagar
                    </a>
                </div>
            </div>

            <div th:if="${parcela.paga}" class="mt-4 text-sm text-gray-700 space-y-1 bg-white p-3 rounded-lg border border-emerald-100">
                <p class="flex items-center gap-2">
                    <i data-lucide="dollar-sign" class="w-4 h-4 text-emerald-600"></i>
                    <strong>Valor Pago:</strong>
                    <span class="text-emerald-700 font-semibold"
                          th:text="'R$ ' + ${#numbers.formatDecimal(parcela.valorPago, 1, 'COMMA', 2, 'POINT')}"></span>
                </p>
                <p class="flex items-center gap-2">
                    <i data-lucide="calendar" class="w-4 h-4 text-emerald-600"></i>
                    <strong>Data de Pagamento:</strong>
                    <span th:text="${#temporals.format(parcela.dataPagamento, 'dd/MM/yyyy')}"></span>
                </p>
            </div>
        </div>
    </div>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
