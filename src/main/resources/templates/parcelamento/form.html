<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Novo Parcelamento</title>
  <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">

  <!-- Header consolidado com navegação -->
  <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
          <a href="/" class="hover:underline flex items-center gap-1">
            <i data-lucide="home" class="w-4 h-4"></i>
            Início
          </a>
          <span>/</span>
          <a href="/parcelamentostf/todos" class="hover:underline">Parcelamentos</a>
          <span>/</span>
          <span>Novo</span>
        </div>
        <!-- Título -->
        <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
          Novo Parcelamento
        </h1>
      </div>
      <a href="/parcelamentostf/todos"
         class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        Voltar
      </a>
    </div>
  </div>

<form th:action="@{/parcelamentostf}" th:object="${parcelamento}" method="post" class="max-w-2xl mx-auto bg-white shadow-lg rounded-2xl p-8 space-y-6 border border-emerald-100">

    <div>
      <label class="block text-emerald-800 font-medium mb-1">Empresa</label>
      <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
        <i data-lucide="building-2" class="w-5 h-5 text-emerald-500"></i>
        <select th:field="*{empresa.id}" class="w-full bg-transparent outline-none text-emerald-800">
          <option th:each="empresa : ${empresas}" th:value="${empresa.id}" th:text="${empresa.nome}"></option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-emerald-800 font-medium mb-1">Descrição Base</label>
      <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
        <i data-lucide="file-text" class="w-5 h-5 text-emerald-500"></i>
        <select th:field="*{descricaoBase.id}" class="w-full bg-transparent outline-none text-emerald-800">
          <option th:each="desc : ${descricoes}" th:value="${desc.id}" th:text="${desc.nome}"></option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-emerald-800 font-medium mb-1">Valor Total</label>
      <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
        <i data-lucide="dollar-sign" class="w-5 h-5 text-emerald-500"></i>
        <input type="number" step="0.01" th:field="*{valorTotal}" class="w-full bg-transparent outline-none text-emerald-800"/>
      </div>
    </div>

    <div>
      <label class="block text-emerald-800 font-medium mb-1">Total de Parcelas</label>
      <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
        <i data-lucide="layers" class="w-5 h-5 text-emerald-500"></i>
        <input type="number" th:field="*{totalParcelas}" class="w-full bg-transparent outline-none text-emerald-800"/>
      </div>
    </div>

    <div>
      <label class="block text-emerald-800 font-medium mb-1">Data Início</label>
      <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
        <i data-lucide="calendar" class="w-5 h-5 text-emerald-500"></i>
        <input type="date" th:field="*{dataInicio}" class="w-full bg-transparent outline-none text-emerald-800"/>
      </div>
    </div>

    <!-- Container com os dois botões: Voltar (esquerda) e Salvar (direita) -->
    <div class="flex justify-between items-center mt-8">

      <!-- Botão de Voltar -->
      <a href="/parcelamentostf/todos"
         class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-5 py-2 rounded-xl hover:bg-emerald-200 transition">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        Voltar
      </a>

      <!-- Botão de Salvar -->
      <button type="submit"
              class="inline-flex items-center gap-2 bg-emerald-600 text-white px-5 py-2 rounded-xl hover:bg-emerald-700 transition shadow-sm">
        <i data-lucide="save" class="w-5 h-5"></i>
        Salvar
      </button>

    </div>
  </form>

</div>

<script>
  lucide.createIcons();
</script>
</body>
</html>
