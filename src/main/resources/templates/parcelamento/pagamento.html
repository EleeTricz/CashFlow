<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Pagamento de Parcela</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">

  <!-- Header consolidado com navegação -->
  <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
          <a href="/" class="hover:underline flex items-center gap-1">
            <i data-lucide="home" class="w-4 h-4"></i>
            Início
          </a>
          <span>/</span>
          <a href="/parcelamentostf/todos" class="hover:underline">Parcelamentos</a>
          <span>/</span>
          <span>Pagamento</span>
        </div>
        <!-- Título -->
        <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
          Pagamento da Parcela <span th:text="${parcela.numeroParcela}"></span>
        </h1>
      </div>
      <a href="/parcelamentostf/todos"
         class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        Voltar
      </a>
    </div>
  </div>

<div class="max-w-2xl mx-auto bg-white shadow-lg rounded-2xl p-8 space-y-6 border border-emerald-100">

    <form th:action="@{/parcelamentostf/pagar}" method="post" class="space-y-5" >
        <input type="hidden" name="parcelaId" th:value="${parcela.id}" />

        <div>
            <label class="block text-emerald-800 font-medium mb-1" for="valorBase">Valor Base</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="dollar-sign" class="w-5 h-5 text-emerald-500"></i>
                <input id="valorBase" type="number" step="0.01" name="valorBase" th:value="${parcela.valorPrincipal}" required
                       class="w-full bg-transparent outline-none text-emerald-800" />
            </div>
        </div>

        <div>
            <label class="block text-emerald-800 font-medium mb-1" for="valorEncargos">Encargos (Juros + Multa)</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="dollar-sign" class="w-5 h-5 text-emerald-500"></i>
                <input id="valorEncargos" type="number" step="0.01" name="valorEncargos" required
                       class="w-full bg-transparent outline-none text-emerald-800" />
            </div>
        </div>

        <div>
            <label class="block text-emerald-800 font-medium mb-1" for="dataPagamento">Data Pagamento</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="calendar" class="w-5 h-5 text-emerald-500"></i>
                <input id="dataPagamento" type="date" name="dataPagamento" required
                       class="w-full bg-transparent outline-none text-emerald-800" />
            </div>
        </div>

        <div>
            <label class="block text-emerald-800 font-medium mb-1" for="competencia">Competência</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="clock" class="w-5 h-5 text-emerald-500"></i>
                <input id="competencia" type="text" name="competencia" placeholder="MM/AAAA" required
                       class="w-full bg-transparent outline-none text-emerald-800" />
            </div>
        </div>

        <div>
            <label class="block text-emerald-800 font-medium mb-1" for="competenciaReferida">Competência Referida</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="calendar-clock" class="w-5 h-5 text-emerald-500"></i>
                <input id="competenciaReferida" type="text" name="competenciaReferida" placeholder="MM/AAAA" required
                       class="w-full bg-transparent outline-none text-emerald-800" />
            </div>
        </div>

        <!-- Botões Voltar e Confirmar Pagamento -->
        <div class="flex justify-between items-center mt-8">

            <a href="/parcelamentostf/todos"
               class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-5 py-2 rounded-xl hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>

            <button type="submit"
                    class="inline-flex items-center gap-2 bg-emerald-600 text-white px-5 py-2 rounded-xl hover:bg-emerald-700 transition shadow-sm">
                <i data-lucide="check-circle" class="w-5 h-5"></i>
                Confirmar Pagamento
            </button>

        </div>
    </form>
</div>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
