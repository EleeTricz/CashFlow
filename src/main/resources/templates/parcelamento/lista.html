<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Parcelamentos</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 text-gray-900 font-sans min-h-screen">

<div class="container mx-auto px-4 md:px-8 py-8">

    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <span>Parcelamentos</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Parcelamentos
                </h1>
            </div>
            <div class="flex gap-2">
                <a href="/parcelamentostf/novo"
                   class="inline-flex items-center gap-2 bg-emerald-600 text-white px-5 py-2 rounded-xl hover:bg-emerald-700 transition shadow">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    Novo Parcelamento
                </a>
                <a href="/"
                   class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    Início
                </a>
            </div>
        </div>
    </div>

    <!-- Tabela de Parcelamentos -->
    <div class="bg-white rounded-2xl shadow-lg border border-emerald-100 p-6">
        <div class="overflow-x-auto">
            <table class="min-w-full table-auto text-sm text-gray-800">
                <thead class="bg-emerald-100">
                <tr>
                    <th class="p-4 text-left font-semibold text-emerald-800">Empresa</th>
                    <th class="p-4 text-left font-semibold text-emerald-800">Descrição</th>
                    <th class="p-4 text-left font-semibold text-emerald-800">Total</th>
                    <th class="p-4 text-left font-semibold text-emerald-800">Parcelas</th>
                    <th class="p-4 text-left font-semibold text-emerald-800">Quitado</th>
                    <th class="p-4 text-left font-semibold text-emerald-800">Total Pago</th>
                    <th class="p-4 text-left font-semibold text-emerald-800">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="parcelamento : ${parcelamentos}" class="border-t border-emerald-50 hover:bg-emerald-50/50 transition">
                    <td class="p-4" th:text="${parcelamento.empresa.nome}">Empresa X</td>
                    <td class="p-4" th:text="${parcelamento.descricaoBase.nome}">Descrição</td>
                    <td class="p-4 text-emerald-700 font-medium"
                        th:text="'R$ ' + ${#numbers.formatDecimal(parcelamento.valorTotal, 1, 'COMMA', 2, 'POINT')}">
                        R$ 0,00
                    </td>
                    <td class="p-4" th:text="${parcelamento.totalParcelas}">0</td>
                    <td class="p-4">
                        <span th:if="${parcelamento.quitado}" class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-medium">
                            <i data-lucide="check-circle" class="w-3 h-3"></i> Sim
                        </span>
                        <span th:unless="${parcelamento.quitado}" class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-amber-100 text-amber-700 text-xs font-medium">
                            <i data-lucide="clock" class="w-3 h-3"></i> Não
                        </span>
                    </td>
                    <td class="p-4 text-emerald-700 font-medium"
                        th:text="'R$ ' + ${#numbers.formatDecimal(parcelamento.valorTotalPago, 1, 'COMMA', 2, 'POINT')}">
                        R$ 0,00
                    </td>
                    <td class="p-4">
                        <div class="flex flex-col gap-2">
                            <a th:href="@{'/parcelamentostf/' + ${parcelamento.id}}"
                               class="inline-flex items-center gap-1 text-emerald-600 hover:text-emerald-800 text-sm font-medium">
                                <i data-lucide="eye" class="w-4 h-4"></i> Detalhes
                            </a>

                            <form th:action="@{'/parcelamentostf/excluir/' + ${parcelamento.id}}" method="post"
                                  onsubmit="return confirm('Tem certeza que deseja excluir este parcelamento?')">
                                <button type="submit"
                                        class="inline-flex items-center gap-1 text-red-600 hover:text-red-800 text-sm font-medium">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i> Excluir
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
