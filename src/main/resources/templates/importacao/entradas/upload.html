<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Importar Entradas</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">
    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a href="/importartf/todas" class="hover:underline">Importações</a>
                    <span>/</span>
                    <span>Entradas</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Importar Entradas (Extrato .txt)
                </h1>
            </div>
            <a th:href="@{/importartf/todas}"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>
        </div>
    </div>

<!-- Container do formulário -->
<div class="w-full max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-10 border border-emerald-100">

    <!-- Mensagem de sucesso -->
    <div th:if="${mensagem != null and !mensagem.startsWith('Erro:')}"
         class="mb-6 flex items-center gap-2 bg-emerald-100 text-emerald-800 border border-emerald-300 p-4 rounded-xl">
        <i data-lucide="check-circle" class="w-6 h-6"></i>
        <span th:text="${mensagem}"></span>
    </div>

    <!-- Mensagem de erro -->
    <div th:if="${mensagem != null and mensagem.startsWith('Erro:')}"
         class="mb-6 flex items-center gap-2 bg-red-100 text-red-800 border border-red-300 p-4 rounded-xl">
        <i data-lucide="x-circle" class="w-6 h-6"></i>
        <span th:text="${mensagem}"></span>
    </div>

    <form th:action="@{/importacaotf/entradas}" method="post" enctype="multipart/form-data" class="space-y-8">

        <!-- Seleção da empresa -->
        <div>
            <label for="empresaId" class="block text-lg font-medium text-emerald-800 mb-2">Empresa</label>
            <select name="empresaId" id="empresaId" required
                    class="w-full p-3 border border-emerald-300 rounded-xl focus:ring-emerald-500 focus:border-emerald-500">
                <option value="" disabled selected>Selecione uma empresa</option>
                <option th:each="empresa : ${empresas}"
                        th:value="${empresa.id}"
                        th:text="${empresa.nome}">Empresa</option>
            </select>
        </div>

        <!-- Campo ano base -->
        <div>
            <label for="anoBase" class="block text-lg font-medium text-emerald-800 mb-2">Ano Base</label>
            <input type="number" name="anoBase" id="anoBase" required
                   class="w-full p-3 border border-emerald-300 rounded-xl focus:ring-emerald-500 focus:border-emerald-500" />
        </div>

        <!-- Upload do arquivo -->
        <div>
            <label for="arquivo" class="block text-lg font-medium text-emerald-800 mb-2">Arquivo .txt</label>
            <input type="file" name="arquivo" id="arquivo" accept=".txt" required
                   class="block w-full p-3 text-base text-emerald-800 border border-emerald-300 rounded-xl cursor-pointer bg-white focus:outline-none focus:ring-emerald-500 focus:border-emerald-500" />
        </div>

        <!-- Botões -->
        <div class="flex justify-between items-center pt-4">
            <!-- Botão Cancelar -->
            <a th:href="@{/importartf/todas}"
               class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-6 py-3 rounded-xl hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Cancelar
            </a>

            <!-- Botão Enviar -->
            <button type="submit"
                    class="inline-flex items-center gap-2 bg-emerald-600 text-white px-6 py-3 rounded-xl hover:bg-emerald-700 transition shadow-md">
                <i data-lucide="upload" class="w-5 h-5"></i>
                Enviar TXT
            </button>
        </div>
    </form>
</div>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
