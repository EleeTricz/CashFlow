<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Importar Planilha Excel</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">
    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a href="/importartf/todas" class="hover:underline">Importações</a>
                    <span>/</span>
                    <span>Excel</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Importar Planilha Excel
                </h1>
            </div>
            <a th:href="@{/empresastf/{empresaId}(empresaId=${empresaId})}"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>
        </div>
    </div>

<form th:action="@{/importacaotf/excel}" method="post" enctype="multipart/form-data"
      class="space-y-6 max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-lg border border-emerald-100">

    <!-- Mensagens de sucesso -->
    <div th:if="${mensagemSucesso}"
         class="flex items-center gap-2 bg-emerald-100 text-emerald-800 border border-emerald-300 p-4 rounded-xl">
        <i data-lucide="check-circle" class="w-6 h-6"></i>
        <span th:text="${mensagemSucesso}"></span>
    </div>

    <!-- Mensagens de erro -->
    <div th:if="${mensagemErro}"
         class="flex items-center gap-2 bg-red-100 text-red-800 border border-red-300 p-4 rounded-xl">
        <i data-lucide="x-circle" class="w-6 h-6"></i>
        <span th:text="${mensagemErro}"></span>
    </div>

    <!-- Empresa -->
    <div>
        <label for="empresaId" class="block text-lg font-medium text-emerald-800">Empresa Selecionada</label>
        <div class="relative">
            <!-- Campo de visualização (desabilitado) -->
            <select id="empresaId" disabled
                    class="w-full p-3 border border-emerald-300 rounded-xl bg-emerald-50 text-emerald-700 cursor-not-allowed">
                <option th:each="empresa : ${empresas}"
                        th:value="${empresa.id}"
                        th:text="${empresa.nome}"
                        th:selected="${empresa.id eq empresaSelecionada}">
                </option>
            </select>

            <!-- Campo oculto para submissão real -->
            <input type="hidden" name="empresaId" th:value="${empresaSelecionada}" />
        </div>
    </div>

    <!-- Arquivo Excel -->
    <div>
        <label for="file" class="block text-lg font-medium text-emerald-800">Arquivo Excel</label>
        <div class="flex items-center space-x-3">
            <input type="file" name="file" id="file" accept=".xlsx,.xls" required
                   class="flex-1 p-3 border border-emerald-300 rounded-xl focus:ring-emerald-500 focus:border-emerald-500 bg-white">
        </div>
    </div>

    <!-- Botões de ação -->
    <div class="flex justify-between">
        <!-- Botão Cancelar -->
        <a th:href="@{/empresastf/{empresaId}(empresaId=${empresaId})}"
           class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-6 py-3 rounded-xl hover:bg-emerald-200 transition">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            Cancelar
        </a>

        <!-- Botão Importar -->
        <button type="submit"
                class="inline-flex items-center gap-2 bg-emerald-600 text-white px-6 py-3 rounded-xl hover:bg-emerald-700 transition">
            <i data-lucide="upload" class="w-5 h-5"></i>
            Importar
        </button>
    </div>
</form>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
