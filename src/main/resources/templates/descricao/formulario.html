<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <title>Criar Nova Descrição</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">

    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a href="/empresastf/todas" class="hover:underline">Empresas</a>
                    <span>/</span>
                    <span class="text-gray-500">Nova Descrição</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Nova Descrição
                </h1>
            </div>
            <a th:href="@{/lancamentostf/novo/{empresaId}/{competenciaId}(empresaId=${empresaId}, competenciaId=${competenciaId})}"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>
        </div>
    </div>

<!-- Formulário -->
<form th:action="@{/descricoestf}" th:object="${descricao}" method="post" class="space-y-6 max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-emerald-100">
    <!-- Campo para o ID da empresa -->
    <input type="hidden" name="empresaId" th:value="${empresaId}" />

        <!-- Faltava este campo oculto para competenciaId -->
        <input type="hidden" name="competenciaId" th:value="${competenciaId}" />

        <!-- Nome da descrição -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Nome</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="file-text" class="w-5 h-5 text-emerald-500"></i>
                <input type="text" th:field="*{nome}" class="w-full bg-transparent outline-none text-emerald-800" required />
            </div>
        </div>

        <!-- Tipo da descrição (Entrada ou Saída) -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Tipo</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="arrow-left-right" class="w-5 h-5 text-emerald-500"></i>
                <select th:field="*{tipo}" class="w-full bg-transparent outline-none text-emerald-800" required>
                    <option value="ENTRADA">Entrada</option>
                    <option value="SAIDA">Saída</option>
                </select>
            </div>
        </div>

        <!-- Código Crédito -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Código Crédito</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="hash" class="w-5 h-5 text-emerald-500"></i>
                <input type="text" th:field="*{codigoCredito}" class="w-full bg-transparent outline-none text-emerald-800" required />
            </div>
        </div>

        <!-- Código Débito -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Código Débito</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="hash" class="w-5 h-5 text-emerald-500"></i>
                <input type="text" th:field="*{codigoDebito}" class="w-full bg-transparent outline-none text-emerald-800" required />
            </div>
        </div>

        <!-- Código Histórico -->
        <div>
            <label class="block text-sm font-medium text-emerald-800 mb-1">Código Histórico</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="history" class="w-5 h-5 text-emerald-500"></i>
                <input type="text" th:field="*{codigoHistorico}" class="w-full bg-transparent outline-none text-emerald-800" required />
            </div>
        </div>

        <!-- Botões -->
        <div class="flex justify-between items-center pt-4">
            <a th:href="@{/lancamentostf/novo/{empresaId}/{competenciaId}(empresaId=${empresaId}, competenciaId=${competenciaId})}" 
               class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-6 py-3 rounded-xl hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>
            <button type="submit" class="inline-flex items-center gap-2 bg-emerald-600 text-white px-6 py-3 rounded-xl hover:bg-emerald-700 transition shadow-sm">
                <i data-lucide="save" class="w-5 h-5"></i>
                Salvar
            </button>
        </div>
    </form>

</div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
