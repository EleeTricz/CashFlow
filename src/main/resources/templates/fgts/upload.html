<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Importação FGTS</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen bg-emerald-50">

<div class="max-w-5xl mx-auto px-6 py-10">

    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a href="/importartf/todas" class="hover:underline">Importações</a>
                    <span>/</span>
                    <span>FGTS</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Importação de FGTS
                </h1>
                <p class="text-emerald-600 mt-1 text-sm">
                    Faça upload das guias em PDF ou extratos TXT para importar os lançamentos
                </p>
            </div>
            <a th:href="@{/importartf/todas}"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>
        </div>
    </div>

    <!-- ALERTAS -->
    <div th:if="${mensagem}"
         class="mb-6 rounded-2xl border border-emerald-200 bg-emerald-50 px-5 py-4 text-emerald-700 shadow-sm">
        <span th:text="${mensagem}"></span>
    </div>

    <div th:if="${erro}"
         class="mb-6 rounded-2xl border border-red-200 bg-red-50 px-5 py-4 text-red-700 shadow-sm">
        <span th:text="${erro}"></span>
    </div>

    <!-- GRID DOS CARDS -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- CARD PDF -->
        <div class="bg-white rounded-3xl shadow-lg border border-emerald-100 p-8 hover:shadow-xl transition duration-300">
            <div class="mb-6">
                <h2 class="text-2xl font-semibold text-emerald-800">
                    Importar Guia PDF
                </h2>
                <p class="text-sm text-emerald-600 mt-1">
                    Utilize para guias do FGTS Digital
                </p>
            </div>

            <form th:action="@{/importacaotf/fgts/upload-pdf}"
                  method="post"
                  enctype="multipart/form-data"
                  class="space-y-5">

                <div>
                    <label class="block mb-2 font-medium text-emerald-800">
                        Empresa
                    </label>
                    <select name="empresaId"
                            class="w-full border border-emerald-200 rounded-xl p-3 focus:ring-2 focus:ring-emerald-400 outline-none"
                            required>
                        <option value="">Selecione</option>
                        <option th:each="empresa : ${empresas}"
                                th:value="${empresa.id}"
                                th:text="${empresa.nome}">
                        </option>
                    </select>
                </div>

                <div>
                    <label class="block mb-2 font-medium text-emerald-800">
                        Arquivos PDF
                    </label>
                    <input type="file"
                           name="files"
                           multiple
                           accept=".pdf"
                           class="w-full border border-emerald-200 rounded-xl p-3 file:mr-4 file:rounded-lg file:border-0 file:bg-emerald-100 file:px-4 file:py-2 file:text-emerald-700"
                           required>
                </div>

                <button type="submit"
                        class="w-full bg-emerald-600 hover:bg-emerald-700 transition text-white font-semibold py-3 rounded-xl shadow-md">
                    Importar PDF
                </button>
            </form>
        </div>

        <!-- CARD TXT -->
        <div class="bg-white rounded-3xl shadow-lg border border-emerald-100 p-8 hover:shadow-xl transition duration-300">
            <div class="mb-6">
                <h2 class="text-2xl font-semibold text-emerald-800">
                    Importar Extrato TXT
                </h2>
                <p class="text-sm text-emerald-600 mt-1">
                    Utilize para depósitos FGTS via Extrato do ICPCAIXA até 03/2024
                </p>
            </div>

            <form th:action="@{/importacaotf/fgts/upload-txt}"
                  method="post"
                  enctype="multipart/form-data"
                  class="space-y-5">

                <div>
                    <label class="block mb-2 font-medium text-emerald-800">
                        Empresa
                    </label>
                    <select name="empresaId"
                            class="w-full border border-emerald-200 rounded-xl p-3 focus:ring-2 focus:ring-emerald-400 outline-none"
                            required>
                        <option value="">Selecione</option>
                        <option th:each="empresa : ${empresas}"
                                th:value="${empresa.id}"
                                th:text="${empresa.nome}">
                        </option>
                    </select>
                </div>

                <div>
                    <label class="block mb-2 font-medium text-emerald-800">
                        Arquivos TXT
                    </label>
                    <input type="file"
                           name="files"
                           multiple
                           accept=".txt"
                           class="w-full border border-emerald-200 rounded-xl p-3 file:mr-4 file:rounded-lg file:border-0 file:bg-emerald-100 file:px-4 file:py-2 file:text-emerald-700"
                           required>
                </div>

                <button type="submit"
                        class="w-full bg-emerald-600 hover:bg-emerald-700 transition text-white font-semibold py-3 rounded-xl shadow-md">
                    Importar TXT
                </button>
            </form>
        </div>

    </div>

    <!-- BOTÃO CANCELAR -->
    <div class="mt-10 flex justify-center">
        <a th:href="@{/importartf/todas}"
           class="inline-flex items-center gap-2 px-8 py-3 rounded-xl border border-emerald-300 text-emerald-700 font-semibold bg-white hover:bg-emerald-50 transition shadow-sm">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            Cancelar / Voltar
        </a>
    </div>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
