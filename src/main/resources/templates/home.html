<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CashFlow - Início</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          darkMode: 'class', // 👈 habilita modo escuro via classe
        }
    </script>


    <!-- Aplica tema escuro salvo no localStorage -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @keyframes fade-in-down {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-down {
            animation: fade-in-down 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-white dark:from-gray-900 dark:to-gray-800 text-green-900 dark:text-green-100 font-sans min-h-screen pt-20 flex flex-col items-center">

<!-- Navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<!-- Conteúdo principal -->
<main class="animate-fade-in-down flex flex-col items-center px-4">

    <!-- Título -->
    <h1 class="text-3xl font-bold text-green-800 dark:text-green-100 mb-10 leading-relaxed tracking-wide text-center">
        Bem-vindo ao sistema de controle financeiro
    </h1>

    <!-- Opções -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-6xl">

        <a href="/importartf/todas" class="bg-white dark:bg-gray-800 hover:bg-green-100 dark:hover:bg-gray-700 text-green-700 dark:text-green-200 border border-green-300 dark:border-green-600 p-6 rounded-2xl shadow-lg text-center w-full max-w-xs mx-auto transition duration-300 ease-in-out transform hover:-translate-y-1">
            <i data-lucide="download" class="w-8 h-8 mx-auto mb-2"></i>
            <div class="text-lg font-semibold">Importação Geral</div>
        </a>

        <a href="/empresastf/todas" class="bg-white dark:bg-gray-800 hover:bg-green-100 dark:hover:bg-gray-700 text-green-700 dark:text-green-200 border border-green-300 dark:border-green-600 p-6 rounded-2xl shadow-lg text-center w-full max-w-xs mx-auto transition duration-300 ease-in-out transform hover:-translate-y-1">
            <i data-lucide="building" class="w-8 h-8 mx-auto mb-2"></i>
            <div class="text-lg font-semibold">Gerenciar Empresas</div>
        </a>

        <a href="/parcelamentostf/todos" class="bg-white dark:bg-gray-800 hover:bg-green-100 dark:hover:bg-gray-700 text-green-700 dark:text-green-200 border border-green-300 dark:border-green-600 p-6 rounded-2xl shadow-lg text-center w-full max-w-xs mx-auto transition duration-300 ease-in-out transform hover:-translate-y-1">
            <i data-lucide="credit-card" class="w-8 h-8 mx-auto mb-2"></i>
            <div class="text-lg font-semibold">Gerenciar Parcelamentos</div>
        </a>

        <a href="/exportacaotf" class="bg-white dark:bg-gray-800 hover:bg-green-100 dark:hover:bg-gray-700 text-green-700 dark:text-green-200 border border-green-300 dark:border-green-600 p-6 rounded-2xl shadow-lg text-center w-full max-w-xs mx-auto transition duration-300 ease-in-out transform hover:-translate-y-1">
            <i data-lucide="upload" class="w-8 h-8 mx-auto mb-2"></i>
            <div class="text-lg font-semibold">Exportação Geral</div>
        </a>

    </div>
</main>

<!-- Rodapé -->
<div th:replace="fragments/footer :: footer"></div>

<!-- Scripts finais -->
<script>
    // Ativa ícones do Lucide após carregar
    window.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();

        const toggleBtn = document.getElementById('toggle-theme');
        const themeIcon = document.getElementById('theme-icon');

        // Atualiza ícone inicial
        if (document.documentElement.classList.contains('dark')) {
            themeIcon.textContent = '☀️';
        } else {
            themeIcon.textContent = '🌙';
        }

        toggleBtn.addEventListener('click', () => {
            const html = document.documentElement;
            html.classList.toggle('dark');

            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.textContent = isDark ? '☀️' : '🌙';
        });
    });
</script>

</body>
</html>
