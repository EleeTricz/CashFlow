<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empresas - CashFlow</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto p-4 md:p-8">
    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <span>Empresas</span>
                </div>
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-700">Empresas Cadastradas</h1>
            </div>
        </div>
    </div>

    <!-- Seleção de Usuário -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-6">
        <form th:action="@{/empresastf/usuario}" method="get" class="flex flex-col md:flex-row items-end gap-4">
            <div class="w-full md:w-1/3">
                <label for="usuario" class="block text-sm font-medium text-emerald-700 mb-2">Filtrar por Responsável</label>
                <select name="usuarioId" id="usuario" class="w-full p-3 rounded-xl border border-emerald-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition text-sm">
                    <option value="">Todos os usuários</option>
                    <option th:each="usuario : ${usuarios}"
                            th:value="${usuario.id}"
                            th:text="${usuario.nome}"></option>
                </select>
            </div>
            <button type="submit" class="inline-flex items-center gap-2 bg-emerald-600 text-white hover:bg-emerald-700 py-3 px-6 rounded-xl transition shadow-sm">
                <i data-lucide="search" class="w-4 h-4"></i>
                Filtrar
            </button>
        </form>
    </div>

    <!-- Empresas -->
    <div th:if="${empresas}" class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-emerald-800">Empresas</h2>
            <span class="text-sm text-emerald-600"
                  th:text="${#lists.size(empresas)} + ' encontrada(s)'"></span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <a th:each="empresa : ${empresas}"
               th:href="@{/empresastf/{id}(id=${empresa.id})}"
               class="block bg-white border border-emerald-100 rounded-xl shadow-sm p-5 hover:shadow-md hover:border-emerald-300 transition-all duration-200">

                <div class="flex items-start justify-between">
                    <div class="flex items-center gap-3">
                        <div class="bg-emerald-100 text-emerald-700 p-2 rounded-lg">
                            <i data-lucide="building-2" class="w-5 h-5"></i>
                        </div>
                        <h3 class="font-semibold text-gray-800"
                            th:text="${empresa.nome}">Empresa</h3>
                    </div>
                </div>

                <div class="mt-4 inline-flex items-center gap-2 text-emerald-600 text-sm font-medium">
                    Acessar
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </div>
            </a>
        </div>
    </div>

    <!-- Botão para criar nova empresa -->
    <div class="mt-6 flex justify-center">
        <a href="/empresastf/nova" class="inline-flex items-center gap-2 bg-emerald-600 text-white py-3 px-6 rounded-xl shadow-sm hover:bg-emerald-700 transition">
            <i data-lucide="plus" class="w-5 h-5"></i>
            Cadastrar Nova Empresa
        </a>
    </div>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
