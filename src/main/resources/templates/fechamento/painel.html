<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel de Fechamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 min-h-screen">

<div class="max-w-6xl mx-auto p-8">

    <div class="bg-white rounded-2xl shadow-lg p-6 border border-emerald-100">

        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-emerald-700">
                Painel de Fechamento
            </h1>

            <div class="text-sm text-gray-500">
                Progresso: <span th:text="${percentual}"></span>%
            </div>
        </div>

        <div class="w-full bg-emerald-100 rounded-full h-4 mb-6">
            <div
                    class="bg-emerald-500 h-4 rounded-full transition-all"
                    th:style="'width:' + ${percentual} + '%;'">
            </div>
        </div>

        <table class="w-full">
            <thead>
            <tr class="text-left text-emerald-700 border-b">
                <th class="py-3">Descrição</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${painel}"
                class="border-b hover:bg-emerald-50">

                <td class="py-4" th:text="${item.descricao}"></td>

                <td>
                        <span
                                th:if="${item.status == 'CONCLUÍDO'}"
                                class="px-3 py-1 rounded-full text-sm bg-emerald-100 text-emerald-700">
                            CONCLUÍDO
                        </span>

                    <span
                            th:if="${item.status == 'PENDENTE'}"
                            class="px-3 py-1 rounded-full text-sm bg-amber-100 text-amber-700">
                            PENDENTE
                        </span>
                </td>
            </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
