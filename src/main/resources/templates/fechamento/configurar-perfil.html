<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Configurar Perfil</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="max-w-4xl mx-auto px-4 md:px-8 py-8">

    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1 flex-wrap">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a th:href="@{/empresastf/todas}" class="hover:underline">Empresas</a>
                    <span>/</span>
                    <a th:href="@{/empresastf/{id}(id=${empresa.id})}" th:text="${empresa.nome}" class="hover:underline">Empresa</a>
                    <span>/</span>
                    <span>Configurar Perfil</span>
                </div>
                <!-- Título -->
                <h1 class="text-2xl md:text-3xl font-bold text-emerald-800">
                    Configurar Perfil Esperado
                </h1>
            </div>
            <a th:href="@{/empresastf/{id}(id=${empresa.id})}"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Empresa
            </a>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-8">

        <p class="text-gray-600 mb-6">
            Empresa:
            <span class="font-semibold"
                  th:text="${empresa.nome}"></span>
        </p>

        <form th:action="@{/fechamento/perfil/salvar}"
              th:object="${form}"
              method="post">

            <input type="hidden"
                   name="empresaId"
                   th:value="${empresa.id}" />

            <div class="mb-6">
                <label class="block text-sm font-medium text-emerald-700 mb-3">
                    Itens esperados no fechamento
                </label>

                <div class="grid grid-cols-2 gap-4">

                    <label th:each="desc : ${descricoes}"
                           class="flex items-center gap-3 p-3 rounded-xl border border-emerald-100 hover:bg-emerald-50">

                        <input type="checkbox"
                               name="descricoesSelecionadas"
                               th:value="${desc.id}"
                               class="w-4 h-4 text-emerald-600">

                        <span th:text="${desc.nome}"></span>
                    </label>

                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-emerald-700 mb-2">
                    Frequência
                </label>

                <select th:field="*{frequencia}"
                        class="w-full border border-emerald-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-400">

                    <option value="MENSAL">Mensal</option>
                    <option value="TRIMESTRAL">Trimestral</option>
                    <option value="ANUAL">Anual</option>
                </select>
            </div>

            <div class="flex justify-between items-center gap-3">
                <a th:href="@{/empresastf/{id}(id=${empresa.id})}"
                   class="inline-flex items-center gap-2 px-5 py-3 rounded-xl bg-gray-100 text-gray-600 hover:bg-gray-200 transition">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Voltar para Empresa
                </a>

                <div class="flex gap-3">
                    <a th:href="@{/empresastf/todas}"
                       class="px-5 py-3 rounded-xl bg-gray-100 text-gray-600 hover:bg-gray-200 transition">
                        Lista de Empresas
                    </a>

                    <button type="submit"
                            class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-emerald-600 text-white hover:bg-emerald-700 shadow transition">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        Salvar Perfil
                    </button>
                </div>
            </div>

        </form>

    </div>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
