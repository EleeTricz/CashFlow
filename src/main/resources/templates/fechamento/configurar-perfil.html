<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Configurar Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 min-h-screen">

<div class="max-w-4xl mx-auto py-10 px-6">

    <div class="bg-white rounded-2xl shadow-lg border border-emerald-100 p-8">

        <h1 class="text-2xl font-bold text-emerald-700 mb-6">
            Configurar Perfil Esperado
        </h1>

        <p class="text-gray-600 mb-6">
            Empresa:
            <span class="font-semibold"
                  th:text="${empresa.nome}"></span>
        </p>

        <form th:action="@{/fechamento/perfil/salvar}"
              th:object="${form}"
              method="post">

            <input type="hidden"
                   name="empresaId"
                   th:value="${empresa.id}" />

            <div class="mb-6">
                <label class="block text-sm font-medium text-emerald-700 mb-3">
                    Itens esperados no fechamento
                </label>

                <div class="grid grid-cols-2 gap-4">

                    <label th:each="desc : ${descricoes}"
                           class="flex items-center gap-3 p-3 rounded-xl border border-emerald-100 hover:bg-emerald-50">

                        <input type="checkbox"
                               name="descricoesSelecionadas"
                               th:value="${desc.id}"
                               class="w-4 h-4 text-emerald-600">

                        <span th:text="${desc.nome}"></span>
                    </label>

                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-emerald-700 mb-2">
                    Frequência
                </label>

                <select th:field="*{frequencia}"
                        class="w-full border border-emerald-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-400">

                    <option value="MENSAL">Mensal</option>
                    <option value="TRIMESTRAL">Trimestral</option>
                    <option value="ANUAL">Anual</option>
                </select>
            </div>

            <div class="flex justify-end gap-3">
                <a th:href="@{/empresastf/todas}"
                   class="px-5 py-3 rounded-xl bg-gray-100 text-gray-600 hover:bg-gray-200">
                    Cancelar
                </a>

                <button type="submit"
                        class="px-6 py-3 rounded-xl bg-emerald-600 text-white hover:bg-emerald-700 shadow">
                    Salvar Perfil
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
