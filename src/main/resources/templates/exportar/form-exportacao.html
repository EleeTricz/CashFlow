<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exportar Lançamentos</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">

    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <span>Exportar</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Exportar Lançamentos
                </h1>
            </div>
            <a href="/"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Início
            </a>
        </div>
    </div>

<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-8 border border-emerald-100">
    <form th:action="@{/exportacaotf/exportar}" method="get" class="space-y-6">

        <!-- Empresa -->
        <div>
            <label for="empresaId" class="block text-sm font-medium text-emerald-800 mb-1">Empresa</label>
            <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                <i data-lucide="building-2" class="w-5 h-5 text-emerald-500"></i>
                <select name="empresaId" id="empresaId" required class="w-full bg-transparent outline-none text-emerald-800">
                    <option value="" disabled selected>Selecione uma empresa</option>
                    <option th:each="empresa : ${empresas}"
                            th:value="${empresa.id}"
                            th:text="${empresa.nome}">Empresa</option>
                </select>
            </div>
        </div>

        <!-- Período -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="mesInicial" class="block text-sm font-medium text-emerald-800 mb-1">Mês Inicial</label>
                <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                    <i data-lucide="calendar" class="w-5 h-5 text-emerald-500"></i>
                    <input type="number" name="mesInicial" id="mesInicial" min="1" max="12" required
                           class="w-full bg-transparent outline-none text-emerald-800">
                </div>
            </div>
            <div>
                <label for="anoInicial" class="block text-sm font-medium text-emerald-800 mb-1">Ano Inicial</label>
                <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                    <i data-lucide="calendar-days" class="w-5 h-5 text-emerald-500"></i>
                    <input type="number" name="anoInicial" id="anoInicial" min="2000" required
                           class="w-full bg-transparent outline-none text-emerald-800">
                </div>
            </div>
            <div>
                <label for="mesFinal" class="block text-sm font-medium text-emerald-800 mb-1">Mês Final</label>
                <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                    <i data-lucide="calendar" class="w-5 h-5 text-emerald-500"></i>
                    <input type="number" name="mesFinal" id="mesFinal" min="1" max="12" required
                           class="w-full bg-transparent outline-none text-emerald-800">
                </div>
            </div>
            <div>
                <label for="anoFinal" class="block text-sm font-medium text-emerald-800 mb-1">Ano Final</label>
                <div class="flex items-center gap-2 border border-emerald-300 rounded-xl p-3 bg-emerald-50">
                    <i data-lucide="calendar-days" class="w-5 h-5 text-emerald-500"></i>
                    <input type="number" name="anoFinal" id="anoFinal" min="2000" required
                           class="w-full bg-transparent outline-none text-emerald-800">
                </div>
            </div>
        </div>

        <!-- Botões -->
        <div class="flex justify-between items-center pt-6">
            <a href="/"
               class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-5 py-3 rounded-xl hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>
            <button type="submit"
                    class="inline-flex items-center gap-2 bg-emerald-600 text-white px-6 py-3 rounded-xl hover:bg-emerald-700 transition shadow-sm">
                <i data-lucide="upload" class="w-5 h-5"></i>
                Exportar TXT
            </button>
        </div>

    </form>
</div>

</div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
