<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Importação de Pagamentos – TaxConnect</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">
    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a href="/importartf/todas" class="hover:underline">Importações</a>
                    <span>/</span>
                    <span>TaxConnect</span>
                </div>
                <!-- Título -->
                <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800">
                    Importação TaxConnect
                </h1>
            </div>
            <a th:href="@{/importartf/todas}"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Voltar
            </a>
        </div>
    </div>

<!-- Container -->
<div class="w-full max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-10 border border-emerald-100">

    <!-- Mensagem de sucesso -->
    <div th:if="${mensagem}"
         class="mb-6 flex items-center gap-2 bg-emerald-100 text-emerald-800 border border-emerald-300 p-4 rounded-xl">
        <i data-lucide="check-circle" class="w-6 h-6"></i>
        <span th:text="${mensagem}"></span>
    </div>

    <!-- Mensagem de erro -->
    <div th:if="${erro}"
         class="mb-6 flex items-center gap-2 bg-red-100 text-red-800 border border-red-300 p-4 rounded-xl">
        <i data-lucide="x-circle" class="w-6 h-6"></i>
        <span th:text="${erro}"></span>
    </div>

    <!-- Formulário -->
    <form th:action="@{/integracoes/taxconnect/importar}"
          th:object="${form}"
          method="post"
          class="space-y-8">

        <!-- Empresa -->
        <div>
            <label class="block text-lg font-medium text-emerald-800 mb-2">
                Empresa
            </label>
            <select th:field="*{empresaId}"
                    required
                    class="w-full p-3 border border-emerald-300 rounded-xl
                           focus:ring-emerald-500 focus:border-emerald-500">
                <option value="" disabled selected>Selecione uma empresa</option>
                <option th:each="e : ${empresas}"
                        th:value="${e.id}"
                        th:text="${e.nome}">
                </option>
            </select>
        </div>

        <!-- Data início -->
        <div>
            <label class="block text-lg font-medium text-emerald-800 mb-2">
                Data início
            </label>
            <input type="date"
                   th:field="*{dataInicio}"
                   required
                   class="w-full p-3 border border-emerald-300 rounded-xl
                          focus:ring-emerald-500 focus:border-emerald-500"/>
        </div>

        <!-- Data fim -->
        <div>
            <label class="block text-lg font-medium text-emerald-800 mb-2">
                Data fim
            </label>
            <input type="date"
                   th:field="*{dataFim}"
                   required
                   class="w-full p-3 border border-emerald-300 rounded-xl
                          focus:ring-emerald-500 focus:border-emerald-500"/>
        </div>

        <!-- Botões -->
        <div class="flex justify-between items-center pt-4">

            <!-- Cancelar -->
            <a th:href="@{/importartf/todas}"
               class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700
                      px-6 py-3 rounded-xl hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Cancelar
            </a>

            <!-- Enviar -->
            <button type="submit"
                    class="inline-flex items-center gap-2 bg-emerald-600 text-white
                           px-6 py-3 rounded-xl hover:bg-emerald-700 transition shadow-md">
                <i data-lucide="download" class="w-5 h-5"></i>
                Consultar e Importar
            </button>

        </div>
    </form>
</div>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
