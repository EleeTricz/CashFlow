<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Importação de Pagamentos – TaxConnect</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 min-h-screen flex flex-col items-center justify-start py-10 px-4 font-sans">

<!-- Título -->
<h1 class="text-4xl font-bold text-green-800 mb-8">
    Importação de Pagamentos – TaxConnect
</h1>

<!-- Container -->
<div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl p-10 border border-green-200">

    <!-- Mensagem de sucesso -->
    <div th:if="${mensagem}"
         class="mb-6 flex items-center bg-green-100 text-green-800 border border-green-300 p-4 rounded-md">
        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        <span th:text="${mensagem}"></span>
    </div>

    <!-- Mensagem de erro -->
    <div th:if="${erro}"
         class="mb-6 flex items-center bg-red-100 text-red-800 border border-red-300 p-4 rounded-md">
        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        <span th:text="${erro}"></span>
    </div>

    <!-- Formulário -->
    <form th:action="@{/integracoes/taxconnect/importar}"
          th:object="${form}"
          method="post"
          class="space-y-8">

        <!-- Empresa -->
        <div>
            <label class="block text-lg font-medium text-green-800 mb-2">
                Empresa
            </label>
            <select th:field="*{empresaId}"
                    required
                    class="w-full p-3 border border-green-300 rounded-md
                           focus:ring-green-500 focus:border-green-500">
                <option value="" disabled selected>Selecione uma empresa</option>
                <option th:each="e : ${empresas}"
                        th:value="${e.id}"
                        th:text="${e.nome}">
                </option>
            </select>
        </div>

        <!-- Data início -->
        <div>
            <label class="block text-lg font-medium text-green-800 mb-2">
                Data início
            </label>
            <input type="date"
                   th:field="*{dataInicio}"
                   required
                   class="w-full p-3 border border-green-300 rounded-md
                          focus:ring-green-500 focus:border-green-500"/>
        </div>

        <!-- Data fim -->
        <div>
            <label class="block text-lg font-medium text-green-800 mb-2">
                Data fim
            </label>
            <input type="date"
                   th:field="*{dataFim}"
                   required
                   class="w-full p-3 border border-green-300 rounded-md
                          focus:ring-green-500 focus:border-green-500"/>
        </div>

        <!-- Botões -->
        <div class="flex justify-between items-center pt-4">

            <!-- Cancelar -->
            <a th:href="@{/importartf/todas}"
               class="flex items-center bg-green-100 text-green-800
                      px-6 py-3 rounded-md hover:bg-green-200 transition">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M15 19l-7-7 7-7"/>
                </svg>
                Cancelar
            </a>

            <!-- Enviar -->
            <button type="submit"
                    class="inline-flex justify-center px-6 py-3 border border-green-600
                           shadow-md text-base rounded-lg text-white bg-green-600
                           hover:bg-green-700 focus:outline-none">
                Consultar e Importar
            </button>

        </div>
    </form>
</div>

</body>
</html>
