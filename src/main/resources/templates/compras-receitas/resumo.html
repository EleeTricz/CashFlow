<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resumo Receita x Compras</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-cashflow.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">

<div class="container mx-auto px-4 md:px-8 py-8">
    <!-- Header consolidado com navegação -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <!-- Breadcrumb -->
                <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium mb-1">
                    <a href="/" class="hover:underline flex items-center gap-1">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        Início
                    </a>
                    <span>/</span>
                    <a th:href="@{/empresastf/todas}" class="hover:underline">Empresas</a>
                    <span>/</span>
                    <a th:href="@{/empresastf/{id}(id=${empresa.id})}" th:text="${empresa.nome}" class="hover:underline">Empresa</a>
                    <span>/</span>
                    <span>Resumo Receitas/Compras</span>
                </div>
                <!-- Título -->
                <h1 class="text-2xl md:text-3xl font-bold text-emerald-800">
                    Resumo Receitas x Compras
                </h1>
                <p class="text-emerald-600 mt-1 text-sm" th:text="${empresa.nome} + ' (' + ${ano} + ')'"></p>
            </div>
            <a th:href="@{/empresastf/{empresaId}(empresaId=${empresa.id})}"
               class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Empresa
            </a>
        </div>
    </div>

<!-- Tabela de Resumo -->
<div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6">
    <table class="table-auto w-full">
        <thead class="bg-emerald-100 text-emerald-800">
        <tr>
            <th class="px-4 py-3 text-left text-sm font-semibold rounded-tl-lg">Mês</th>
            <th class="px-4 py-3 text-left text-sm font-semibold">Receitas</th>
            <th class="px-4 py-3 text-left text-sm font-semibold rounded-tr-lg">Compras</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="linha : ${resumo}" class="border-t border-emerald-50 hover:bg-emerald-50/50">
            <td class="px-4 py-3 text-sm text-gray-800"
                th:text="${#dates.format(#dates.create(2023, linha.mes, 1), 'MMM')}">Jan</td>
            <td class="px-4 py-3 text-sm text-gray-800"
                th:text="'R$ ' + ${#numbers.formatDecimal(linha.receitas, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</td>
            <td class="px-4 py-3 text-sm text-gray-800"
                th:text="'R$ ' + ${#numbers.formatDecimal(linha.compras, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</td>
        </tr>
        </tbody>
        <tfoot class="bg-emerald-50 font-semibold">
        <tr>
            <td class="px-4 py-3 text-sm text-emerald-800 rounded-bl-lg">Total</td>
            <td class="px-4 py-3 text-sm text-emerald-800"
                th:text="'R$ ' + ${#numbers.formatDecimal(totalReceitas, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</td>
            <td class="px-4 py-3 text-sm text-emerald-800 rounded-br-lg"
                th:text="'R$ ' + ${#numbers.formatDecimal(totalCompras, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</td>
        </tr>
        </tfoot>
    </table>
</div>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
